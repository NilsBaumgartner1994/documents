# Local development override – use with:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#
# This override skips Traefik and makes Paperless-ngx available at
# http://localhost:8000 and Open WebUI at http://localhost:3000 so you can
# run the stack on your local machine without a public domain or
# Let's Encrypt certificate.

name: paperless

services:

  # Disable Traefik – not needed for local use
  traefik:
    profiles:
      - prod   # only active when explicitly started with --profile prod

  # Expose Paperless-ngx directly on port 8000 and use plain HTTP
  paperless:
    ports:
      - "8000:8000"
    environment:
      PAPERLESS_URL: http://localhost:8000

  # Expose Open WebUI directly on port 3000 and use plain HTTP
  open-webui:
    ports:
      - "3000:8080"
    environment:
      WEBUI_AUTH: ${OPEN_WEBUI_AUTH:-false}
