name: paperless

services:

  # ── Traefik – Reverse Proxy ──────────────────────────────────────────────
  # Works out of the box for localhost with HTTPS (self-signed certificate).
  # For production with a real domain and automatic Let's Encrypt TLS see
  # the README section "Traefik details".
  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    command:
      - "--log.level=INFO"
      # HTTP entrypoint
      - "--entrypoints.web.address=:80"
      # HTTPS entrypoint
      - "--entrypoints.websecure.address=:443"
      # Docker provider – discovers services via Docker labels
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Read-only access to the Docker socket so Traefik can discover services
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy

  # ── Redis – Message broker for Paperless-ngx task queue ──────────────────
  broker:
    image: docker.io/library/redis:7
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - paperless-internal

  # ── PostgreSQL – Database for Paperless-ngx ───────────────────────────────
  db:
    image: docker.io/library/postgres:16
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${PAPERLESS_DBNAME:-paperless}
      POSTGRES_USER: ${PAPERLESS_DBUSER:-paperless}
      POSTGRES_PASSWORD: ${PAPERLESS_DBPASS:?Set PAPERLESS_DBPASS in .env}
    networks:
      - paperless-internal

  # ── Gotenberg – Document-to-PDF conversion service ────────────────────────
  gotenberg:
    image: docker.io/gotenberg/gotenberg:8.20
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"
    networks:
      - paperless-internal

  # ── Apache Tika – Content extraction (enables full-text search for many
  #    file formats such as DOCX, XLSX, ODT, …) ─────────────────────────────
  tika:
    image: docker.io/apache/tika:3.1.0.0
    restart: unless-stopped
    networks:
      - paperless-internal

  # ── Paperless-ngx – Document Management System ───────────────────────────
  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      - db
      - broker
      - gotenberg
      - tika
    volumes:
      - paperless-data:/usr/src/paperless/data
      - paperless-media:/usr/src/paperless/media
      - paperless-export:/usr/src/paperless/export
      - paperless-consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: redis://broker:6379
      PAPERLESS_DBHOST: db
      PAPERLESS_DBNAME: ${PAPERLESS_DBNAME:-paperless}
      PAPERLESS_DBUSER: ${PAPERLESS_DBUSER:-paperless}
      PAPERLESS_DBPASS: ${PAPERLESS_DBPASS:?Set PAPERLESS_DBPASS in .env}
      # Enable Tika + Gotenberg for extended file-format support
      PAPERLESS_TIKA_ENABLED: 1
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://tika:9998
      # Application settings
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY:?Set PAPERLESS_SECRET_KEY in .env}
      PAPERLESS_URL: ${PAPERLESS_URL:-http://localhost}
      PAPERLESS_TIME_ZONE: ${TZ:-Europe/Berlin}
      USERMAP_UID: ${USERMAP_UID:-1000}
      USERMAP_GID: ${USERMAP_GID:-1000}
    networks:
      - paperless-internal
      - proxy
    labels:
      - "traefik.enable=true"
      # HTTP router (localhost / plain HTTP)
      - "traefik.http.routers.paperless.rule=Host(`${PAPERLESS_DOMAIN:-localhost}`)"
      - "traefik.http.routers.paperless.entrypoints=web"
      # HTTPS router (self-signed by default; set CERT_RESOLVER for Let's Encrypt)
      - "traefik.http.routers.paperless-secure.rule=Host(`${PAPERLESS_DOMAIN:-localhost}`)"
      - "traefik.http.routers.paperless-secure.entrypoints=websecure"
      - "traefik.http.routers.paperless-secure.tls=true"
      - "traefik.http.services.paperless.loadbalancer.server.port=8000"
      # Tell Traefik to reach this container via the shared proxy network
      - "traefik.docker.network=paperless-proxy"

  # ── copilot-api – GitHub Copilot → OpenAI-compatible bridge ─────────────
  # Exposes the GitHub Copilot models via an OpenAI-compatible REST API so
  # that Paperless-AI (and any other OpenAI client) can use them locally.
  # Requires a GitHub account with an active Copilot subscription.
  #
  # First-time setup:
  #   Obtain a GitHub token with Copilot access:
  #     npx copilot-api@latest auth
  #   Then set COPILOT_GH_TOKEN in your .env file.
  copilot-api:
    image: nghyane/copilot-api:latest
    container_name: copilot-api
    restart: unless-stopped
    environment:
      GH_TOKEN: ${COPILOT_GH_TOKEN:?Set COPILOT_GH_TOKEN in .env}
    networks:
      # proxy gives outbound internet access so the container can reach GitHub
      - proxy

  # ── Paperless-AI – Automatic AI tagging for Paperless-ngx ───────────────
  # Watches Paperless-ngx for new documents and automatically assigns titles,
  # tags, correspondents, and document types using the GitHub Copilot API
  # (via the local copilot-api bridge above).
  # Web UI is available at http://<host>:3000 after first start.
  #
  # First-time setup:
  #   1. Start the stack and open http://<host>:3000
  #   2. Complete the setup wizard (or restart the container to apply the
  #      environment variables pre-filled below).
  paperless-ai:
    image: clusterzx/paperless-ai
    container_name: paperless-ai
    restart: unless-stopped
    depends_on:
      paperless:
        condition: service_started
      copilot-api:
        condition: service_started
    ports:
      - "3000:3000"
    volumes:
      - paperless-ai-data:/app/data
    environment:
      PAPERLESS_API_URL: http://paperless:8000/api
      PAPERLESS_API_TOKEN: ${PAPERLESS_AI_TOKEN:?Set PAPERLESS_AI_TOKEN in .env}
      # Use the local copilot-api bridge as an OpenAI-compatible endpoint
      AI_PROVIDER: custom
      CUSTOM_BASE_URL: http://copilot-api:4141/v1
      CUSTOM_API_KEY: no-key-needed
      CUSTOM_MODEL: ${COPILOT_MODEL:-gpt-4o}
    networks:
      # paperless-internal to reach the Paperless-ngx API
      - paperless-internal
      # proxy to reach the copilot-api container
      - proxy

  # ── rclone-config – Init container: generate rclone.conf from .env ──────
  # Runs once at startup, writes /config/rclone/rclone.conf into the shared
  # rclone-config volume, then exits.  rclone-sync waits for it to finish.
  rclone-config:
    image: alpine:3
    restart: "no"
    volumes:
      - rclone-config:/config/rclone
      - ./rclone/generate-config.sh:/generate-config.sh:ro
    environment:
      RCLONE_REMOTE: ${RCLONE_REMOTE:-gdrive}
      RCLONE_TYPE: ${RCLONE_TYPE:-drive}
      RCLONE_SCOPE: ${RCLONE_SCOPE:-drive}
      RCLONE_TOKEN: ${RCLONE_TOKEN:-}
      # Optional: own OAuth client credentials (recommended – rclone's built-in
      # credentials may be restricted by Google for token refresh).
      # See https://rclone.org/drive/#making-your-own-client-id
      RCLONE_CLIENT_ID: ${RCLONE_CLIENT_ID:-}
      RCLONE_CLIENT_SECRET: ${RCLONE_CLIENT_SECRET:-}
      # Optional: service account JSON path (for Google Workspace / automated setups)
      RCLONE_SERVICE_ACCOUNT_FILE: ${RCLONE_SERVICE_ACCOUNT_FILE:-}
    entrypoint: /bin/sh
    command: ["/generate-config.sh"]
    networks: []

  # ── rclone – Google Drive synchronisation ────────────────────────────────
  # Periodically mirrors the Paperless media and export directories to a
  # Google Drive folder. Credentials are read from the .env file; rclone.conf
  # is generated automatically by the rclone-config init container above.
  rclone-sync:
    image: rclone/rclone:latest
    restart: unless-stopped
    depends_on:
      rclone-config:
        condition: service_completed_successfully
      paperless:
        condition: service_started
    volumes:
      # Mount document volumes read-only – rclone only reads, never writes
      - paperless-media:/data/media:ro
      - paperless-export:/data/export:ro
      # rclone configuration generated by the rclone-config init container
      - rclone-config:/config/rclone:ro
      # Sync script
      - ./rclone/sync.sh:/sync.sh:ro
    environment:
      # Name of the rclone remote defined in rclone.conf (default: gdrive)
      RCLONE_REMOTE: ${RCLONE_REMOTE:-gdrive}
      # Destination path inside Google Drive
      RCLONE_DEST_PATH: ${RCLONE_DEST_PATH:-paperless-backup}
      # How often to sync, in seconds (default: every hour)
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-3600}
    entrypoint: /bin/sh
    command: ["/sync.sh"]
    # rclone-sync only needs outbound internet access; no internal network needed
    networks: []

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  # Shared network between Traefik and services that need to be reachable from
  # the internet. Uses an explicit name so the Traefik label can reference it.
  proxy:
    name: paperless-proxy
  # Isolated backend network – Paperless-ngx dependencies are NOT exposed
  paperless-internal:
    internal: true

# ── Named Volumes ─────────────────────────────────────────────────────────────
volumes:
  paperless-data:
  paperless-media:
  paperless-export:
  paperless-consume:
  pgdata:
  redisdata:
  # Shared volume between rclone-config (writer) and rclone-sync (reader)
  rclone-config:
  # Paperless-AI application data (config, RAG index, chat history)
  paperless-ai-data:
